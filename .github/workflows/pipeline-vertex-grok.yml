name: "Pipeline: Vertex Grok (4.20)"

on:
  schedule:
    - cron: '50 1 * * *'  # 01:50 UTC = 07:20 IST daily
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Pipeline (Vertex Grok)
        env:
          GCP_PROJECT_ID: rashscore
          GCP_REGION: us-central1
          NODE_ENV: production
        run: npx tsx scripts/run-pipeline.ts --provider=vertex-grok --models=xai/grok-4.20-non-reasoning,xai/grok-4.3

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Pipeline [Vertex Grok]: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
