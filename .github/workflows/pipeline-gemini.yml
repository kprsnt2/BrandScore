name: "Pipeline: Gemini (2.5-flash)"

on:
  schedule:
    - cron: '10 1 * * *'  # 01:10 UTC = 06:40 IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pipeline (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production
        run: npx tsx scripts/run-pipeline.ts --provider=gemini --models=gemini-2.5-flash,gemini-2.5-flash-lite

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Pipeline [Gemini]: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
