name: "Pipeline: Vertex Gemini (2.5-flash)"

on:
  schedule:
    - cron: '20 1 * * *'  # 01:20 UTC = 06:50 IST daily
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Pipeline (Vertex Gemini)
        env:
          GCP_PROJECT_ID: rashscore
          GCP_REGION: europe-west1
          NODE_ENV: production
        run: npx tsx scripts/run-pipeline.ts --provider=vertex-gemini --models=gemini-2.5-flash,gemini-2.5-flash-lite

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Pipeline [Vertex Gemini]: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
