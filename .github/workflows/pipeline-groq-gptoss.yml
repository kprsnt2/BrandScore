name: "Pipeline: Groq GPT-OSS"

on:
  schedule:
    - cron: '30 1 * * *'  # 01:30 UTC = 07:00 IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pipeline (Groq GPT-OSS)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY_2 }}
          NODE_ENV: production
        run: npx tsx scripts/run-pipeline.ts --provider=groq --models=openai/gpt-oss-120b,openai/gpt-oss-20b --api-key-env=GROQ_API_KEY

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Pipeline [Groq GPT-OSS]: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
