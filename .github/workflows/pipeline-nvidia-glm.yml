name: "Pipeline: NVIDIA GLM"

on:
  schedule:
    - cron: '40 1 * * *'  # 01:40 UTC = 07:10 IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pipeline (NVIDIA GLM)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NODE_ENV: production
        run: npx tsx scripts/run-pipeline.ts --provider=nvidia --models=z-ai/glm-5.2,nvidia/nemotron-3-ultra-550b-a55b --api-key-env=NVIDIA_API_KEY

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Pipeline [NVIDIA GLM]: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
