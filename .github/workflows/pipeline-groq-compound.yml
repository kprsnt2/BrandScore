name: "Pipeline: Groq Compound"

on:
  schedule:
    - cron: '20 1 * * *'  # 01:20 UTC = 06:50 IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pipeline (Groq Compound)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NODE_ENV: production
        run: npx tsx scripts/run-pipeline.ts --provider=groq --models=groq/compound,groq/compound-mini --api-key-env=GROQ_API_KEY

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Pipeline [Groq Compound]: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
