name: "Pipeline: NVIDIA DeepSeek"

on:
  schedule:
    - cron: '50 1 * * *'  # 01:50 UTC = 07:20 IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Pipeline (NVIDIA DeepSeek)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY_2 }}
          NODE_ENV: production
        run: npx tsx scripts/run-pipeline.ts --provider=nvidia --models=deepseek-ai/deepseek-v4-pro,deepseek-ai/deepseek-v4-flash --api-key-env=NVIDIA_API_KEY

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Pipeline [NVIDIA DeepSeek]: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
